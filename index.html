<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX - ULTIMATE REACTION STUDIO</title>
    <style>
        :root { --neon: #00ff00; --dark: #000; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main-view { display: flex; flex: 1; overflow: hidden; }
        
        /* Lateral */
        .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .btn-upload { background: var(--neon); color: black; padding: 10px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 5px; margin-bottom: 15px; }
        .media-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .media-item { background: #222; padding: 5px; border-radius: 4px; display: flex; align-items: center; gap: 10px; font-size: 10px; }
        .media-item img, .media-item video { width: 50px; height: 30px; object-fit: cover; }

        /* Monitor */
        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #050505; position: relative; }
        #canvas-render { width: 95%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid #333; cursor: crosshair; }
        
        /* Controles Flotantes sobre el Monitor */
        .overlay-controls { position: absolute; top: 30px; right: 40px; display: flex; flex-direction: column; gap: 10px; }
        .cam-mode-btn { background: rgba(0,255,0,0.2); border: 1px solid var(--neon); color: var(--neon); padding: 5px 10px; cursor: pointer; font-size: 10px; }

        /* Timeline */
        .timeline { height: 180px; background: #000; border-top: 2px solid #333; display: flex; flex-direction: column; }
        .timeline-header { padding: 8px; display: flex; justify-content: center; gap: 20px; border-bottom: 1px solid #222; }
        .track { flex: 1; overflow-x: auto; display: flex; align-items: center; padding: 0 50px; gap: 5px; }
        .clip { min-width: 130px; height: 70px; border: 2px solid var(--neon); position: relative; cursor: grab; background-size: cover; background-position: center; }
        
        .btn-rec { background: var(--red); color: white; padding: 10px 25px; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .recording { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX ULTIMATE</div>
    <div style="display:flex; gap:15px;">
        <button class="cam-mode-btn" onclick="toggleCam()">📷 CÁMARA ON/OFF</button>
        <button class="cam-mode-btn" onclick="setCamFull()">👤 SOLO YO / CUADRITO</button>
        <button class="cam-mode-btn" onclick="editTxt()">📝 TEXTO</button>
    </div>
</header>

<div class="main-view">
    <aside class="sidebar">
        <div class="btn-upload" onclick="document.getElementById('file-input').click()">📥 SUBIR FOTOS/VIDEOS</div>
        <input type="file" id="file-input" multiple accept="image/*,video/*" style="display:none;" onchange="handleFiles(event)">
        <div id="media-list" class="media-list"></div>
    </aside>

    <main class="monitor-area">
        <canvas id="canvas-render" width="1280" height="720"></canvas>
        <div id="status" style="position:absolute; bottom:10px; color:#444; font-size:10px;">ARRASTRA TU CARA PARA MOVERLA EN EL VIDEO</div>
    </main>
</div>

<div class="timeline">
    <div class="timeline-header">
        <button id="recBtn" class="btn-rec" onclick="startCapture()">🎙️ GRABAR REACCIÓN</button>
        <button id="dlBtn" style="background:var(--neon); border:none; padding:10px 20px; cursor:pointer; font-weight:bold; border-radius:5px;" onclick="download()" disabled>📥 BAJAR MP4</button>
    </div>
    <div class="track" id="main-track" ondragover="event.preventDefault()" ondrop="dropMedia(event)"></div>
</div>

<video id="hidden-cam" autoplay playsinline style="display:none"></video>
<video id="hidden-video-player" loop muted style="display:none"></video>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const camElement = document.getElementById('hidden-cam');
    const videoPlayer = document.getElementById('hidden-video-player');

    let mediaItems = [];
    let isCamActive = false;
    let camFull = false;
    let camX = 930, camY = 50, camW = 320, camH = 240;
    let isDraggingCam = false;
    let subtitle = "REACCIÓN ÉLITE";
    let recorder, chunks = [], isRecording = false, videoBlob;

    // 1. CARGA DE ARCHIVOS (FOTOS Y VIDEOS)
    function handleFiles(e) {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            const isVideo = file.type.includes('video');
            reader.onload = (ev) => {
                const obj = { name: file.name, type: isVideo ? 'video' : 'img', src: ev.target.result };
                if(!isVideo) {
                    const img = new Image(); img.src = ev.target.result;
                    obj.el = img;
                }
                mediaItems.push(obj);
                updateTimeline();
            };
            reader.readAsDataURL(file);
        });
    }

    function updateTimeline() {
        const track = document.getElementById('main-track');
        track.innerHTML = "";
        mediaItems.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = "clip";
            div.draggable = true;
            div.ondragstart = (e) => e.dataTransfer.setData("idx", i);
            if(m.type === 'img') div.style.backgroundImage = `url(${m.src})`;
            else div.innerHTML = `<video src="${m.src}" style="width:100%;height:100%;object-fit:cover"></video>`;
            track.appendChild(div);
        });
    }

    function dropMedia(e) {
        const idx = e.dataTransfer.getData("idx");
        const item = mediaItems.splice(idx, 1)[0];
        mediaItems.push(item); // Lo mueve al final o puedes mejorar la lógica de posición
        updateTimeline();
    }

    // 2. MOUSE: ARRASTRAR CÁMARA
    canvas.onmousedown = (e) => {
        const rect = canvas.getBoundingClientRect();
        const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        if(mouseX > camX && mouseX < camX + camW && mouseY > camY && mouseY < camY + camH) isDraggingCam = true;
    };
    window.onmousemove = (e) => {
        if(isDraggingCam) {
            const rect = canvas.getBoundingClientRect();
            camX = (e.clientX - rect.left) * (canvas.width / rect.width) - camW/2;
            camY = (e.clientY - rect.top) * (canvas.height / rect.height) - camH/2;
        }
    };
    window.onmouseup = () => isDraggingCam = false;

    // 3. FUNCIONES DE CÁMARA
    async function toggleCam() {
        if(!isCamActive) {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            camElement.srcObject = s;
            isCamActive = true;
        } else isCamActive = false;
    }
    function setCamFull() { camFull = !camFull; }
    function editTxt() { subtitle = prompt("Texto:", subtitle) || ""; }

    // 4. BUCLE DE RENDERIZADO
    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Fondo (Media)
        if(mediaItems.length > 0) {
            const active = mediaItems[0]; // Simplificado: muestra el primero
            if(active.type === 'img') ctx.drawImage(active.el, 0, 0, canvas.width, canvas.height);
            else {
                if(videoPlayer.src !== active.src) videoPlayer.src = active.src;
                videoPlayer.play();
                ctx.drawImage(videoPlayer, 0, 0, canvas.width, canvas.height);
            }
        }

        // Cámara
        if(isCamActive) {
            if(camFull) ctx.drawImage(camElement, 0, 0, canvas.width, canvas.height);
            else {
                ctx.strokeStyle = var(--neon); ctx.lineWidth = 5;
                ctx.strokeRect(camX, camY, camW, camH);
                ctx.drawImage(camElement, camX, camY, camW, camH);
            }
        }

        // Texto
        ctx.fillStyle = "yellow"; ctx.font = "bold 50px Arial"; ctx.textAlign = "center";
        ctx.fillText(subtitle.toUpperCase(), canvas.width/2, 680);

        requestAnimationFrame(draw);
    }

    // 5. GRABACIÓN
    async function startCapture() {
        const btn = document.getElementById('recBtn');
        if(!isRecording) {
            const audio = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            const stream = canvas.captureStream(30);
            const combined = new MediaStream([...stream.getVideoTracks(), ...audio.getAudioTracks()]);
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                videoBlob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').disabled = false;
            };
            recorder.start(); isRecording = true;
            btn.innerText = "STOP"; btn.classList.add('recording');
        } else {
            recorder.stop(); isRecording = false;
            btn.innerText = "🎙️ GRABAR REACCIÓN"; btn.classList.remove('recording');
        }
    }

    function download() {
        const a = document.createElement('a'); a.href = URL.createObjectURL(videoBlob);
        a.download = "REACCION_CAPACITIUMX.webm"; a.click();
    }

    draw();
</script>
</body>
</html>
