<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - FIX FINAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.10.1/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --dark: #000; --red: #ff4d4d; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 12px; border-bottom: 2px solid var(--neon); display: flex; gap: 10px; align-items: center; }
        .btn-top { padding: 8px 16px; background: #222; border: 1px solid #444; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 220px; border-radius: 4px; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        #gallery { width: 320px; background: #080808; border-right: 1px solid #222; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #151515; border: 1px solid #333; cursor: pointer; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .selected { border: 2px solid var(--neon) !important; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px; }
        #monitor { 
            width: 100%; max-width: 850px; aspect-ratio: 16/9; border: 1px solid #333; 
            background: #050505 center/contain no-repeat; position: relative;
            display: flex; align-items: flex-end; justify-content: center;
        }
        #text-overlay { color: yellow; font-size: 3.5vw; font-weight: bold; text-shadow: 3px 3px 6px #000; margin-bottom: 8%; text-align: center; width: 90%; }

        .timeline { height: 160px; background: #0a0a0a; border-top: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .btn-action { padding: 14px 28px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; font-size: 14px; }
        #status-bar { font-size: 12px; color: #666; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--neon); font-weight:bold;">🔍 TEMA:</div>
    <input type="text" id="topic" value="monterrey nuevo leon">
    <button class="btn-top" onclick="load30Images()">TRAER 30 FOTOS ✨</button>
    <button class="btn-top" onclick="setVideoText()">PONER TEXTO</button>
    <button class="btn-top" style="background:#400;" onclick="location.reload()">LIMPIAR</button>
</header>

<div class="workspace">
    <div id="gallery"></div>
    <div class="monitor-area">
        <div id="monitor"><div id="text-overlay"></div></div>
        <div id="status-bar">SISTEMA CAPACITIUMX ONLINE</div>
    </div>
</div>

<div class="timeline">
    <div style="display: flex; gap: 20px;">
        <button id="recBtn" class="btn-action" style="background:var(--red); color:white;" onclick="handleMic()">🎙️ GRABAR VOZ</button>
        <button id="playBtn" class="btn-action" style="background:#444; color:white;" onclick="hearVoice()" disabled>▶ ESCUCHAR</button>
        <button id="exportBtn" class="btn-action" style="background:var(--neon); color:black;" onclick="startRender()">🎬 EXPORTAR VIDEO MP4</button>
    </div>
</div>

<script>
    let currentImgBlob = null;
    let micRecorder;
    let voiceChunks = [];
    let voiceBlob = null;
    let voiceUrl = "";
    
    // Configuramos FFmpeg para que NO pida permisos de servidor COOP/COEP
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ 
        log: true,
        corePath: 'https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.10.0/dist/ffmpeg-core.js'
    });

    async function load30Images() {
        const q = document.getElementById('topic').value;
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        for(let i=0; i<30; i++) {
            const box = document.createElement('div');
            box.className = "thumb-box";
            const img = document.createElement('img');
            const url = `https://picsum.photos/seed/${q+i}/800/450`;
            img.src = url;
            box.onclick = async () => {
                document.querySelectorAll('.thumb-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                const res = await fetch(url);
                currentImgBlob = await res.blob();
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('monitor').style.backgroundImage = `url('${e.target.result}')`;
                reader.readAsDataURL(currentImgBlob);
            };
            box.appendChild(img);
            gal.appendChild(box);
        }
    }

    function setVideoText() {
        const t = prompt("Texto:");
        if(t) document.getElementById('text-overlay').innerText = t;
    }

    async function handleMic() {
        const btn = document.getElementById('recBtn');
        if (!micRecorder || micRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micRecorder = new MediaRecorder(stream);
            voiceChunks = [];
            micRecorder.ondataavailable = e => voiceChunks.push(e.data);
            micRecorder.onstop = () => {
                voiceBlob = new Blob(voiceChunks, { type: 'audio/mp3' });
                voiceUrl = URL.createObjectURL(voiceBlob);
                document.getElementById('playBtn').disabled = false;
            };
            micRecorder.start();
            btn.innerText = "⏹ DETENER";
        } else {
            micRecorder.stop();
            btn.innerText = "🎙️ GRABAR VOZ";
        }
    }

    function hearVoice() { if(voiceUrl) new Audio(voiceUrl).play(); }

    async function startRender() {
        const st = document.getElementById('status-bar');
        if(!currentImgBlob || !voiceBlob) return alert("Selecciona foto y graba voz.");

        st.innerText = "⚡ RENDERIZANDO... ESPERA";
        
        try {
            if (!ffmpeg.isLoaded()) await ffmpeg.load();

            ffmpeg.FS('writeFile', 'pic.jpg', await fetchFile(currentImgBlob));
            ffmpeg.FS('writeFile', 'snd.mp3', await fetchFile(voiceBlob));

            const txt = document.getElementById('text-overlay').innerText || " ";

            // Comando simplificado para máxima compatibilidad
            await ffmpeg.run(
                '-loop', '1', '-i', 'pic.jpg', '-i', 'snd.mp3',
                '-vf', `scale=1280:720,drawtext=text='${txt}':fontcolor=yellow:fontsize=60:x=(w-text_w)/2:y=h-150`,
                '-c:v', 'libx264', '-t', '5', '-pix_fmt', 'yuv420p', '-shortest', 'final.mp4'
            );

            const data = ffmpeg.FS('readFile', 'final.mp4');
            const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `CAPACITIUMX_MP4.mp4`;
            a.click();
            st.innerText = "✅ DESCARGADO";
        } catch (e) {
            st.innerText = "❌ ERROR: PRUEBA EN OTRO NAVEGADOR O RECARGA";
            console.error(e);
        }
    }
</script>

</body>
</html>
