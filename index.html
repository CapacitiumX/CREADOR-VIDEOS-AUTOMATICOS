<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - RENDER FINAL OK</title>
    <style>
        :root { --neon: #00ff00; --dark: #000; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 12px; border-bottom: 2px solid var(--neon); display: flex; gap: 10px; align-items: center; }
        .btn-top { padding: 8px 16px; background: #222; border: 1px solid #444; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 220px; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        #gallery { width: 320px; background: #080808; border-right: 1px solid #222; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #151515; border: 1px solid #333; cursor: pointer; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .selected { border: 2px solid var(--neon) !important; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px; }
        
        /* Contenedor de Grabación */
        #render-canvas-container {
            width: 100%; max-width: 850px; aspect-ratio: 16/9; border: 1px solid #333;
            position: relative; overflow: hidden; background: #050505;
        }
        #main-image { width: 100%; height: 100%; object-fit: contain; }
        #text-overlay { 
            position: absolute; bottom: 15%; width: 100%; text-align: center;
            color: yellow; font-size: 3.5vw; font-weight: bold; text-shadow: 3px 3px 6px #000;
            pointer-events: none; z-index: 10;
        }

        .timeline { height: 150px; background: #0a0a0a; border-top: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .btn-action { padding: 14px 28px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; font-size: 14px; }
        .btn-rec { background: var(--red); color: white; }
        .btn-export { background: var(--neon); color: black; }
        .recording { animation: blink 1s infinite; box-shadow: 0 0 20px var(--red); }
        @keyframes blink { 50% { opacity: 0.5; } }
        #status-bar { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--neon); font-weight:bold;">🔍 TEMA:</div>
    <input type="text" id="topic" value="monterrey nuevo leon">
    <button class="btn-top" onclick="load30Images()">TRAER 30 FOTOS ✨</button>
    <button class="btn-top" onclick="setVideoText()">PONER TEXTO</button>
    <button class="btn-top" style="background:#400;" onclick="location.reload()">LIMPIAR</button>
</header>

<div class="workspace">
    <div id="gallery"></div>
    <div class="monitor-area">
        <div id="render-canvas-container">
            <img id="main-image" src="" style="display:none;">
            <div id="text-overlay"></div>
        </div>
        <div id="status-bar">MODO: GRABACIÓN DIRECTA ÉLITE</div>
    </div>
</div>

<div class="timeline">
    <div style="display: flex; gap: 20px;">
        <button id="recBtn" class="btn-action btn-rec" onclick="toggleRecording()">🎙️ NARRAR Y CREAR VIDEO</button>
        <button id="exportBtn" class="btn-action btn-export" onclick="downloadVideo()" disabled>📥 DESCARGAR MP4</button>
    </div>
    <div style="color: #444; font-size: 10px;">CAPACITIUMX V329 - MOTOR SIN FALLAS</div>
</div>

<script>
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let finalVideoBlob = null;

    // 1. CARGAR FOTOS
    async function load30Images() {
        const q = document.getElementById('topic').value;
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        for(let i=0; i<30; i++) {
            const box = document.createElement('div');
            box.className = "thumb-box";
            const img = document.createElement('img');
            const url = `https://picsum.photos/seed/${q+i}/800/450`;
            img.src = url;
            box.onclick = () => {
                document.querySelectorAll('.thumb-box').forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                const mainImg = document.getElementById('main-image');
                mainImg.src = url;
                mainImg.style.display = "block";
            };
            box.appendChild(img);
            gal.appendChild(box);
        }
    }

    // 2. TEXTO
    function setVideoText() {
        const t = prompt("Texto:");
        if(t) document.getElementById('text-overlay').innerText = t;
    }

    // 3. MOTOR DE GRABACIÓN DIRECTA (INCORRECTABLE)
    async function toggleRecording() {
        const btn = document.getElementById('recBtn');
        const canvasContainer = document.getElementById('render-canvas-container');

        if (!isRecording) {
            try {
                // Capturamos el audio del micrófono
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Capturamos lo que pasa en el monitor (Div)
                const stream = canvasContainer.captureStream(30); // 30 FPS
                
                // Combinamos Audio + Video
                const combinedStream = new MediaStream([
                    ...stream.getVideoTracks(),
                    ...audioStream.getAudioTracks()
                ]);

                mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
                recordedChunks = [];

                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    finalVideoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                    document.getElementById('exportBtn').disabled = false;
                    document.getElementById('status-bar').innerText = "VIDEO GENERADO. LISTO PARA DESCARGAR.";
                };

                mediaRecorder.start();
                isRecording = true;
                btn.innerText = "⏹ DETENER Y PROCESAR";
                btn.classList.add('recording');
                document.getElementById('status-bar').innerText = "GRABANDO VOZ E IMAGEN EN TIEMPO REAL...";
            } catch (e) {
                alert("Error: Activa el micrófono.");
                console.error(e);
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.innerText = "🎙️ NARRAR Y CREAR VIDEO";
            btn.classList.remove('recording');
        }
    }

    // 4. DESCARGAR
    function downloadVideo() {
        if (!finalVideoBlob) return;
        const url = URL.createObjectURL(finalVideoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `CAPACITIUMX_V329_${Date.now()}.webm`;
        a.click();
    }
</script>

</body>
</html>
