<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - WEB NARRATOR</title>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff0000; }
        body { background: var(--dark); color: white; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #111; padding: 15px; border-bottom: 2px solid var(--neon); display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        .controls { display: flex; gap: 10px; align-items: center; }
        
        input, button { padding: 10px; background: #222; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; cursor: pointer; }
        button:hover { background: var(--neon); color: black; }
        
        #btnGrabar.recording { background: var(--red); color: white; border-color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        main { display: flex; flex: 1; overflow: hidden; }
        #timeline { flex: 2; border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        #preview { flex: 1; background: #000; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .monitor { width: 100%; aspect-ratio: 16/9; border: 2px solid #222; background: #111; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .monitor img { width: 100%; height: 100%; object-fit: cover; }
        
        .voice-card { background: #111; border: 1px solid #333; padding: 15px; width: 90%; margin-top: 20px; text-align: center; }
        audio { width: 100%; margin-top: 10px; filter: invert(100%); }

        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
        .gallery img { width: 100%; border: 1px solid #333; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="controls">
        <span style="color:var(--neon);">[CAPACITIUMX V329]</span>
        <input type="text" id="topic" placeholder="TEMA DEL VIDEO...">
        <button onclick="searchImages()">TRAER FOTOS ✨</button>
    </div>
    
    <div class="controls">
        <button id="btnGrabar" onclick="toggleRegistroVoz()">🎙️ GRABAR NARRACIÓN</button>
        <button style="background: #2563eb; color: white;" onclick="downloadAll()">📥 DESCARGAR KIT</button>
    </div>
</header>

<main>
    <section id="timeline">
        <h3 style="color: var(--neon);">🎞️ LÍNEA DE TIEMPO / RECURSOS:</h3>
        <div id="gallery" class="gallery"></div>
    </section>

    <section id="preview">
        <div class="monitor" id="mainMonitor">
            <span style="color: #333;">SIN SEÑAL</span>
        </div>
        
        <div class="voice-card">
            <strong style="color: var(--neon);">NARRACIÓN ACTUAL:</strong>
            <div id="audioPlaybackContainer">
                <p style="font-size: 10px; color: #666;">No hay grabación activa</p>
            </div>
        </div>

        <textarea id="storyText" style="width: 90%; flex-grow: 1; margin-top: 20px; background: #111; color: #aaa; border: 1px solid #333; padding: 10px;" placeholder="Escribe o pega aquí tu guion para leerlo mientras grabas..."></textarea>
    </section>
</main>

<script>
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    // --- MOTOR DE IMÁGENES ---
    async function searchImages() {
        const topic = document.getElementById('topic').value;
        if(!topic) return alert("Ingresa un tema");
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "<p>Buscando...</p>";

        // Usamos una API de imágenes aleatorias para la demo (Unsplash)
        const keywords = topic.split(' ');
        gallery.innerHTML = "";
        for(let i=0; i<12; i++) {
            const img = document.createElement('img');
            img.src = `https://picsum.photos/400/225?random=${i}&sig=${topic}`;
            img.onclick = () => {
                document.getElementById('mainMonitor').innerHTML = `<img src="${img.src}">`;
            };
            gallery.appendChild(img);
        }
    }

    // --- MOTOR DE VOZ ÉLITE ---
    async function toggleRegistroVoz() {
        const btn = document.getElementById('btnGrabar');
        
        if (!isRecording) {
            // INICIAR GRABACIÓN
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = audioUrl;
                    
                    const container = document.getElementById('audioPlaybackContainer');
                    container.innerHTML = "";
                    container.appendChild(audio);

                    // Botón para descargar el audio solo
                    const dl = document.createElement('a');
                    dl.href = audioUrl;
                    dl.download = "narracion_capacitiumx.wav";
                    dl.innerHTML = "<br><small style='color:cyan'>💾 GUARDAR VOZ (.WAV)</small>";
                    container.appendChild(dl);
                };

                mediaRecorder.start();
                isRecording = true;
                btn.innerText = "⏹ DETENER Y GUARDAR";
                btn.classList.add('recording');
            } catch (err) {
                alert("Error: No se pudo acceder al micrófono. Verifica los permisos de tu navegador.");
            }
        } else {
            // DETENER GRABACIÓN
            mediaRecorder.stop();
            isRecording = false;
            btn.innerText = "🎙️ GRABAR NARRACIÓN";
            btn.classList.remove('recording');
        }
    }

    function downloadAll() {
        alert("Instrucción Élite: La voz grabada aparecerá abajo del monitor. Dale clic en 'GUARDAR VOZ' para descargarla y úsala en tu script de Python para el video final.");
    }
</script>

</body>
</html>
