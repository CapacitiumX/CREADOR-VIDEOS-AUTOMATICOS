<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX - VIRTUAL BACKGROUND PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-load { background: var(--neon); color: black; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; width: 100%; }
        #media-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .thumb-nav { padding: 8px; background: #222; border: 1px solid #444; font-size: 11px; cursor: pointer; }
        .thumb-nav.active { border-color: var(--neon); background: #111; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #canvas-render { width: 95%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid #333; background: #050505; }
        
        .console { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .btn-c { background: rgba(0,0,0,0.85); border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; }

        .footer { height: 150px; background: #111; border-top: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .btn-rec { background: var(--red); color: white; padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; }
        
        select.bg-selector { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 5px; font-size: 10px; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX V329 - CHROMA AI</div>
    <div id="ai-status" style="color:yellow; font-size:11px;">CARGANDO IA DE FONDO...</div>
</header>

<div class="main">
    <aside class="sidebar">
        <button class="btn-load" onclick="document.getElementById('file-in').click()">📥 SUBIR VIDEO/FOTOS</button>
        <input type="file" id="file-in" multiple accept="image/*,video/*" style="display:none;" onchange="handleFiles(event)">
        <div id="media-list"></div>
    </aside>

    <main class="monitor-area">
        <div class="console">
            <label style="font-size:9px; color:white;">FONDO VIRTUAL:</label>
            <select class="bg-selector" id="bgChoice" onchange="changeVirtualBG(this.value)">
                <option value="none">Original (Sin filtro)</option>
                <option value="blur">Desenfoque (Blur)</option>
                <option value="#00ff00">Verde (Chroma Key)</option>
                <option value="#0000ff">Azul Profesional</option>
                <option value="#333333">Gris Obscuro</option>
                <option value="mty1">Monterrey Nocturno</option>
                <option value="mty2">Cerro de la Silla</option>
                <option value="estadio">Estadio Rayados</option>
                <option value="oficina">Oficina Élite</option>
                <option value="black">Negro Total</option>
            </select>
            <hr style="border:0.5px solid #333">
            <button class="btn-c" onclick="camMode='full'">👤 YO GRANDE</button>
            <button class="btn-c" onclick="camMode='mini'">🖼️ YO CHICO</button>
            <button class="btn-c" onclick="camMode='off'">🚫 OCULTARME</button>
            <button class="btn-c" onclick="togglePlay()">▶ PLAY/PAUSA FONDO</button>
        </div>
        <canvas id="canvas-render" width="1280" height="720"></canvas>
    </main>
</div>

<div class="footer">
    <button id="recBtn" class="btn-rec" onclick="toggleCapture()">🎙️ EMPEZAR GRABACIÓN</button>
    <button id="dlBtn" style="display:none; background:var(--neon); padding:10px 20px; font-weight:bold; cursor:pointer;" onclick="download()">📥 GUARDAR MP4</button>
</div>

<video id="v-cam" autoplay playsinline style="display:none"></video>
<video id="v-bg" loop style="display:none" crossorigin="anonymous"></video>
<canvas id="cam-process" width="640" height="480" style="display:none"></canvas>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const vCam = document.getElementById('v-cam');
    const vBg = document.getElementById('v-bg');
    const camProcess = document.getElementById('cam-process');
    const ctxCam = camProcess.getContext('2d');

    let library = [], curIdx = -1, camMode = 'mini', camX = 930, camY = 50, camW = 320, camH = 240;
    let net = null, virtualBGType = 'none', dragging = false, recorder, chunks = [], isRecording = false;

    // Cargar Modelos de IA
    async function loadAI() {
        net = await bodyPix.load({
            architecture: 'MobileNetV1',
            outputStride: 16,
            multiplier: 0.75,
            quantBytes: 2
        });
        document.getElementById('ai-status').innerText = "IA LISTA - CHROMA ACTIVADO";
    }
    loadAI();

    function handleFiles(e) {
        Array.from(e.target.files).forEach(file => {
            const url = URL.createObjectURL(file);
            const isVid = file.type.includes('video');
            const item = { type: isVid ? 'vid' : 'img', url: url, el: null };
            if (!isVid) { const img = new Image(); img.src = url; item.el = img; }
            library.push(item);
            updateList();
            if(curIdx === -1) selectMedia(0);
        });
    }

    function updateList() {
        const list = document.getElementById('media-list');
        list.innerHTML = "";
        library.forEach((m, i) => {
            const d = document.createElement('div');
            d.className = `thumb-nav ${i === curIdx ? 'active' : ''}`;
            d.innerText = `${i+1}. ${m.type === 'vid' ? '🎥 VIDEO' : '🖼️ FOTO'}`;
            d.onclick = () => selectMedia(i);
            list.appendChild(d);
        });
    }

    function selectMedia(i) {
        curIdx = i; const m = library[i];
        if (m.type === 'vid') { vBg.src = m.url; vBg.muted = false; vBg.play(); }
        updateList();
    }

    function changeVirtualBG(val) { virtualBGType = val; }
    function togglePlay() { if (vBg.paused) vBg.play(); else vBg.pause(); }

    navigator.mediaDevices.getUserMedia({ video: true }).then(s => vCam.srcObject = s);

    // BUCLE DE RENDERIZADO CON IA
    async function render() {
        // 1. Limpiar fondo
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 2. Dibujar Media de fondo
        if (curIdx !== -1) {
            const m = library[curIdx];
            if (m.type === 'img' && m.el) ctx.drawImage(m.el, 0, 0, canvas.width, canvas.height);
            else if (m.type === 'vid') ctx.drawImage(vBg, 0, 0, canvas.width, canvas.height);
        }

        // 3. Procesar Cámara con IA si está prendida
        if (camMode !== 'off' && vCam.srcObject) {
            if (net && virtualBGType !== 'none') {
                // Segmentación de persona
                const segmentation = await net.segmentPerson(vCam);
                
                // Dibujar cámara en canvas temporal
                ctxCam.drawImage(vCam, 0, 0, 640, 480);
                const frameData = ctxCam.getImageData(0, 0, 640, 480);
                
                // Aplicar fondo virtual pixel por pixel
                for (let i = 0; i < segmentation.data.length; i++) {
                    if (segmentation.data[i] === 0) { // Si es fondo
                        if (virtualBGType === 'blur') {
                            frameData.data[i * 4 + 3] = 150; // Transparencia parcial
                        } else if (virtualBGType.startsWith('#') || virtualBGType === 'black') {
                            // Color sólido
                            const color = virtualBGType === 'black' ? {r:0,g:0,b:0} : hexToRgb(virtualBGType);
                            frameData.data[i * 4] = color.r;
                            frameData.data[i * 4 + 1] = color.g;
                            frameData.data[i * 4 + 2] = color.b;
                        } else {
                            // Aquí se podrían inyectar imágenes, por ahora lo dejamos transparente para ver el video de atrás
                            frameData.data[i * 4 + 3] = 0; 
                        }
                    }
                }
                ctxCam.putImageData(frameData, 0, 0);
            } else {
                ctxCam.drawImage(vCam, 0, 0, 640, 480);
            }

            // Dibujar resultado en el Monitor principal
            if (camMode === 'full') {
                ctx.drawImage(camProcess, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
                ctx.strokeRect(camX, camY, camW, camH);
                ctx.drawImage(camProcess, camX, camY, camW, camH);
            }
        }
        requestAnimationFrame(render);
    }

    function hexToRgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:0,g:255,b:0};
    }

    // ARRASTRAR CÁMARA
    canvas.onmousedown = (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX - r.left) * (canvas.width / r.width);
        const y = (e.clientY - r.top) * (canvas.height / r.height);
        if(camMode === 'mini' && x > camX && x < camX + camW && y > camY && y < camY + camH) dragging = true;
    };
    window.onmousemove = (e) => {
        if(dragging) {
            const r = canvas.getBoundingClientRect();
            camX = (e.clientX - r.left) * (canvas.width / r.width) - camW/2;
            camY = (e.clientY - r.top) * (canvas.height / r.height) - camH/2;
        }
    };
    window.onmouseup = () => dragging = false;

    async function toggleCapture() {
        const btn = document.getElementById('recBtn');
        if (!isRecording) {
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            const videoStream = canvas.captureStream(30);
            const combined = new MediaStream([...videoStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').style.display = "block";
                document.getElementById('dlBtn').onclick = () => {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = "VIDEO_CON_FONDO_VIRTUAL.webm"; a.click();
                };
            };
            recorder.start(); isRecording = true;
            btn.innerText = "⏹ DETENER"; btn.classList.add('recording');
        } else { recorder.stop(); isRecording = false; btn.innerText = "🎙️ EMPEZAR GRABACIÓN"; }
    }

    render();
</script>
</body>
</html>
