<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - RENDER FINAL OK</title>
    <style>
        :root { --neon: #00ff00; --dark: #000; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 12px; border-bottom: 2px solid var(--neon); display: flex; gap: 10px; align-items: center; }
        .btn-top { padding: 8px 16px; background: #222; border: 1px solid #444; color: white; cursor: pointer; font-weight: bold; border-radius: 4px; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 220px; }

        .workspace { display: flex; flex: 1; overflow: hidden; }
        #gallery { width: 320px; background: #080808; border-right: 1px solid #222; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #151515; border: 1px solid #333; cursor: pointer; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .selected { border: 2px solid var(--neon) !important; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px; }
        
        /* MONITOR PROFESIONAL */
        #main-canvas { 
            width: 100%; max-width: 850px; aspect-ratio: 16/9; border: 1px solid #333; 
            background: #050505; 
        }

        .timeline { height: 150px; background: #0a0a0a; border-top: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .btn-action { padding: 14px 28px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; font-size: 14px; }
        .btn-rec { background: var(--red); color: white; }
        .btn-export { background: var(--neon); color: black; }
        .recording { animation: blink 1s infinite; box-shadow: 0 0 20px var(--red); }
        @keyframes blink { 50% { opacity: 0.5; } }
        #status-bar { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--neon); font-weight:bold;">🔍 TEMA:</div>
    <input type="text" id="topic" value="monterrey nuevo leon">
    <button class="btn-top" onclick="load30Images()">TRAER 30 FOTOS ✨</button>
    <button class="btn-top" onclick="setVideoText()">PONER TEXTO</button>
    <button class="btn-top" style="background:#400;" onclick="location.reload()">🗑️ LIMPIAR</button>
</header>

<div class="workspace">
    <div id="gallery"></div>
    <div class="monitor-area">
        <canvas id="main-canvas" width="1280" height="720"></canvas>
        <div id="status-bar">SISTEMA CAPACITIUMX V329 - LISTO</div>
    </div>
</div>

<div class="timeline">
    <div style="display: flex; gap: 20px;">
        <button id="recBtn" class="btn-action btn-rec" onclick="toggleRecording()">🎙️ NARRAR Y CREAR VIDEO</button>
        <button id="exportBtn" class="btn-action btn-export" onclick="downloadVideo()" disabled>📥 DESCARGAR VIDEO</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d');
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let finalVideoBlob = null;
    let activeImage = new Image();
    let videoText = "";

    // 1. CARGAR FOTOS
    async function load30Images() {
        const q = document.getElementById('topic').value;
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        for(let i=0; i<30; i++) {
            const box = document.createElement('div');
            box.className = "thumb-box";
            const img = document.createElement('img');
            img.src = `https://picsum.photos/seed/${q+i}/800/450`;
            box.onclick = () => {
                activeImage.crossOrigin = "anonymous";
                activeImage.src = img.src;
                activeImage.onload = () => draw();
            };
            box.appendChild(img);
            gal.appendChild(box);
        }
    }

    // 2. TEXTO
    function setVideoText() {
        videoText = prompt("Escribe el subtítulo:");
        draw();
    }

    // DIBUJAR EN EL LIENZO (Esto evita el video negro)
    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        if(activeImage.src) {
            ctx.drawImage(activeImage, 0, 0, canvas.width, canvas.height);
        }
        
        if(videoText) {
            ctx.fillStyle = "yellow";
            ctx.font = "bold 60px Impact";
            ctx.textAlign = "center";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 10;
            ctx.strokeText(videoText.toUpperCase(), canvas.width/2, canvas.height * 0.85);
            ctx.fillText(videoText.toUpperCase(), canvas.width/2, canvas.height * 0.85);
        }
    }

    // 3. GRABACIÓN (Audio + Imagen Real)
    async function toggleRecording() {
        const btn = document.getElementById('recBtn');
        if (!isRecording) {
            try {
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const videoStream = canvas.captureStream(30);
                
                const combined = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...audioStream.getAudioTracks()
                ]);

                mediaRecorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
                recordedChunks = [];
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    finalVideoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                    document.getElementById('exportBtn').disabled = false;
                    document.getElementById('status-bar').innerText = "VIDEO PROCESADO CON ÉXITO.";
                };

                mediaRecorder.start();
                isRecording = true;
                btn.innerText = "⏹ DETENER Y GUARDAR";
                btn.classList.add('recording');
                document.getElementById('status-bar').innerText = "GRABANDO... HABLA AHORA.";
                
                // Mantenemos el dibujo activo durante la grabación
                const anim = () => { if(isRecording) { draw(); requestAnimationFrame(anim); } };
                anim();

            } catch (e) {
                alert("Activa el micrófono.");
            }
        } else {
            mediaRecorder.stop();
            isRecording = false;
            btn.innerText = "🎙️ NARRAR Y CREAR VIDEO";
            btn.classList.remove('recording');
        }
    }

    function downloadVideo() {
        const url = URL.createObjectURL(finalVideoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `CAPACITIUMX_OK.webm`;
        a.click();
    }

    draw(); // Dibujo inicial
</script>

</body>
</html>
