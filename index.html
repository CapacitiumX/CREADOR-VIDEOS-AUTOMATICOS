<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX CLOUD V2 - 30 FOTOS ÉLITE</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; }
        .app-container { display: grid; grid-template-columns: 350px 1fr 300px; height: 100vh; }
        header { grid-column: 1 / span 3; background: #111; padding: 10px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        
        /* Panel Izquierdo: Galería de 30 */
        .panel-left { border-right: 1px solid #333; display: flex; flex-direction: column; background: #0f0f0f; }
        #search-results { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; overflow-y: auto; padding: 10px; flex-grow: 1; }
        .thumb { width: 100%; aspect-ratio: 16/9; cursor: pointer; border: 1px solid #333; object-fit: cover; }
        .thumb:hover { border-color: var(--neon); transform: scale(1.02); }
        .selected-img { border: 2px solid var(--neon) !important; }

        /* Centro: Monitor */
        .preview-area { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #monitor { width: 90%; aspect-ratio: 16/9; border: 1px solid #333; background: #111 url('https://via.placeholder.com/1280x720/000/0f0?text=CAPACITIUMX+READY') center/cover; }
        
        /* Controles */
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 12px 20px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:hover { background: var(--neon); color: black; }
        .rec-active { background: #ff0000 !important; color: white !important; border-color: white !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }

        /* Panel Derecho */
        .panel-right { padding: 15px; background: #0f0f0f; border-left: 1px solid #333; }
        textarea { width: 100%; height: 80%; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-family: monospace; resize: none; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">[ CAPACITIUMX CLOUD ENGINE V2 ]</div>
        <div id="status" style="color: yellow;">ESTADO: ESPERANDO...</div>
    </header>

    <aside class="panel-left">
        <div style="padding: 10px;">
            <input type="text" id="query" placeholder="Ej: Monterrey, Futbol..." style="width:70%; padding:8px; background:#000; color:white; border:1px solid #444;">
            <button onclick="fetchImages()" style="padding:8px;">BUSCAR</button>
        </div>
        <div id="search-results"></div>
    </aside>

    <main class="preview-area">
        <div id="monitor"></div>
        <div class="controls">
            <button id="btnRec" onclick="toggleMic()">🎙️ GRABAR VOZ</button>
            <button id="btnExport" onclick="renderVideo()" style="background: var(--neon); color: black;">🎬 EXPORTAR MP4</button>
        </div>
        <p id="timer" style="color: #666; margin-top: 10px;">00:00</p>
    </main>

    <aside class="panel-right">
        <label>HISTORIA / GUION:</label>
        <textarea id="script" placeholder="Escribe tu historia aquí para leerla mientras grabas..."></textarea>
    </aside>
</div>

<script>
    let selectedImage = "";
    let audioBlob = null;
    let recorder = null;
    let chunks = [];
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    // 1. BUSCADOR DE 30 FOTOS REALES
    async function fetchImages() {
        const q = document.getElementById('query').value;
        if(!q) return alert("Escribe una palabra");
        
        const res = document.getElementById('search-results');
        res.innerHTML = "<p style='color:gray'>Buscando lote de 30...</p>";
        
        try {
            // Usamos Source de Unsplash con términos específicos para evitar fotos random
            res.innerHTML = "";
            for(let i=0; i<30; i++) {
                const imgUrl = `https://source.unsplash.com/800x450/?${encodeURIComponent(q)}&sig=${i}`;
                const img = document.createElement('img');
                img.src = imgUrl;
                img.className = "thumb";
                img.onclick = function() {
                    document.querySelectorAll('.thumb').forEach(t => t.classList.remove('selected-img'));
                    this.classList.add('selected-img');
                    selectedImage = this.src;
                    document.getElementById('monitor').style.backgroundImage = `url('${this.src}')`;
                    document.getElementById('status').innerText = "IMAGEN SELECCIONADA";
                };
                res.appendChild(img);
            }
            document.getElementById('status').innerText = "30 FOTOS CARGADAS";
        } catch (e) {
            alert("Error al conectar con la red de imágenes.");
        }
    }

    // 2. GRABACIÓN DE VOZ CORREGIDA
    async function toggleMic() {
        const btn = document.getElementById('btnRec');
        if (!recorder || recorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                recorder = new MediaRecorder(stream);
                chunks = [];
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    audioBlob = new Blob(chunks, { type: 'audio/mp3' });
                    document.getElementById('status').innerText = "VOZ LISTA PARA EXPORTAR";
                };
                recorder.start();
                btn.classList.add('rec-active');
                btn.innerText = "⏹ DETENER";
                document.getElementById('status').innerText = "GRABANDO...";
            } catch (err) {
                alert("Permiso de micrófono denegado.");
            }
        } else {
            recorder.stop();
            btn.classList.remove('rec-active');
            btn.innerText = "🎙️ GRABAR VOZ";
        }
    }

    // 3. MOTOR DE RENDERIZADO MP4
    async function renderVideo() {
        const status = document.getElementById('status');
        
        if(!selectedImage) return alert("Selecciona una foto de las 30 primero.");
        if(!audioBlob) return alert("Graba tu voz primero.");

        status.innerText = "INICIANDO MOTOR DE VIDEO...";
        document.getElementById('btnExport').disabled = true;

        try {
            if (!ffmpeg.isLoaded()) await ffmpeg.load();
            
            status.innerText = "PROCESANDO MP4... (NO CIERRES)";
            
            // Cargar archivos al sistema virtual
            ffmpeg.FS('writeFile', 'input_img.jpg', await fetchFile(selectedImage));
            ffmpeg.FS('writeFile', 'input_audio.mp3', await fetchFile(audioBlob));

            // Comando Maestro: Crea video de 10 seg con la imagen y el audio
            await ffmpeg.run(
                '-loop', '1', 
                '-i', 'input_img.jpg', 
                '-i', 'input_audio.mp3', 
                '-c:v', 'libx264', 
                '-tune', 'stillimage',
                '-c:a', 'aac', 
                '-b:a', '192k',
                '-pix_fmt', 'yuv420p', 
                '-shortest', 
                '-vf', 'scale=1280:720',
                'final.mp4'
            );

            const data = ffmpeg.FS('readFile', 'final.mp4');
            const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
            
            // Descarga automática
            const link = document.createElement('a');
            link.href = videoUrl;
            link.download = `CAPACITIUMX_VIDEO_${Date.now()}.mp4`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            status.innerText = "✅ ¡VIDEO DESCARGADO!";
        } catch (error) {
            console.error(error);
            status.innerText = "❌ ERROR EN RENDER";
        } finally {
            document.getElementById('btnExport').disabled = false;
        }
    }
</script>

</body>
</html>
