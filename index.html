<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX ULTIMATE V3 - SUBTÍTULOS Y VIDEO</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        
        .main-layout { display: grid; grid-template-columns: 350px 1fr 350px; flex-grow: 1; overflow: hidden; }
        
        /* Galería corregida */
        .sidebar-left { background: #0f0f0f; border-right: 1px solid #333; display: flex; flex-direction: column; }
        #gallery { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 15px; overflow-y: auto; }
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #222; border: 1px solid #444; cursor: pointer; overflow: hidden; }
        .thumb-container img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-container:hover { border-color: var(--neon); }

        /* Monitor central con Texto */
        .editor-center { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #monitor-canvas { 
            width: 90%; 
            aspect-ratio: 16/9; 
            border: 1px solid #333; 
            background-size: cover; 
            background-position: center;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        #overlay-text { 
            color: yellow; 
            font-size: 2.5vw; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px black; 
            margin-bottom: 10%;
            text-align: center;
            width: 80%;
            pointer-events: none;
        }

        /* Botonera inferior */
        .action-bar { background: #111; padding: 20px; border-top: 1px solid #333; display: flex; justify-content: center; gap: 20px; }
        button { padding: 12px 25px; font-weight: bold; cursor: pointer; border: 1px solid var(--neon); background: transparent; color: var(--neon); text-transform: uppercase; }
        button:hover { background: var(--neon); color: black; }
        .recording { background: red !important; color: white !important; border-color: white !important; }

        /* Panel derecho */
        .sidebar-right { background: #0f0f0f; border-left: 1px solid #333; padding: 15px; }
        textarea { width: 100%; height: 70%; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; font-family: monospace; }
        #status-msg { color: yellow; font-size: 12px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; letter-spacing: 2px;">CAPACITIUMX <span style="color:var(--neon)">ULTIMATE V3</span></div>
    <div id="status-tag">SISTEMA LISTO</div>
</header>

<div class="main-layout">
    <aside class="sidebar-left">
        <div style="padding: 15px;">
            <input type="text" id="searchInput" placeholder="Ej: Rayados, Monterrey..." style="width: 100%; padding: 10px; background: #000; color: white; border: 1px solid #444; box-sizing: border-box;">
            <button onclick="search30Images()" style="width: 100%; margin-top: 10px;">BUSCAR 30 FOTOS</button>
        </div>
        <div id="gallery"></div>
    </aside>

    <main class="editor-center">
        <div id="monitor-canvas">
            <div id="overlay-text"></div>
        </div>
        <div id="status-msg">Selecciona una foto y graba tu voz para exportar MP4</div>
    </main>

    <aside class="sidebar-right">
        <label>TEXTO EN VIDEO / GUION:</label>
        <textarea id="scriptInput" placeholder="Escribe aquí. Lo que pongas aparecerá como subtítulo en el video..." oninput="updateTextOverlay()"></textarea>
    </aside>
</div>

<div class="action-bar">
    <button id="btnMic" onclick="toggleRecording()">🎙️ GRABAR NARRACIÓN</button>
    <button id="btnExport" onclick="exportVideoMP4()" style="background: var(--neon); color: black;">🎬 EXPORTAR VIDEO MP4</button>
</div>

<script>
    let selectedImgUrl = "";
    let mediaRecorder;
    let audioChunks = [];
    let audioBlob;
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    // 1. Buscador mejorado (usa imágenes de alta calidad con bypass de caché)
    function search30Images() {
        const query = document.getElementById('searchInput').value;
        if(!query) return alert("Escribe un tema");
        const gallery = document.getElementById('gallery');
        gallery.innerHTML = "";
        
        document.getElementById('status-tag').innerText = "CARGANDO FOTOS...";

        for(let i=0; i<30; i++) {
            const container = document.createElement('div');
            container.className = "thumb-container";
            
            const img = document.createElement('img');
            // Usamos Unsplash con parámetros de búsqueda para evitar que se rompan
            img.src = `https://images.unsplash.com/photo-1?auto=format&fit=crop&w=400&q=60&utm_source=capacitiumx&query=${encodeURIComponent(query)}&sig=${i}`;
            
            container.onclick = () => {
                selectedImgUrl = img.src.replace('w=400', 'w=1280'); // Alta calidad para el monitor
                document.getElementById('monitor-canvas').style.backgroundImage = `url('${selectedImgUrl}')`;
                document.getElementById('status-msg').innerText = "Imagen seleccionada: " + query;
            };
            
            container.appendChild(img);
            gallery.appendChild(container);
        }
        document.getElementById('status-tag').innerText = "30 FOTOS LISTAS";
    }

    // 2. Texto en pantalla (Subtítulos)
    function updateTextOverlay() {
        const text = document.getElementById('scriptInput').value;
        document.getElementById('overlay-text').innerText = text;
    }

    // 3. Grabación de Voz
    async function toggleRecording() {
        const btn = document.getElementById('btnMic');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                document.getElementById('status-msg').innerText = "Narración grabada con éxito.";
            };
            mediaRecorder.start();
            btn.innerText = "⏹ DETENER GRABACIÓN";
            btn.classList.add('recording');
        } else {
            mediaRecorder.stop();
            btn.innerText = "🎙️ GRABAR NARRACIÓN";
            btn.classList.remove('recording');
        }
    }

    // 4. Exportación MP4 con Texto Integrado
    async function exportVideoMP4() {
        if(!selectedImgUrl || !audioBlob) return alert("Falta imagen o audio.");
        
        const status = document.getElementById('status-msg');
        status.innerText = "INICIANDO PROCESO DE RENDERIZADO...";
        
        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        // Guardar archivos
        ffmpeg.FS('writeFile', 'img.jpg', await fetchFile(selectedImgUrl));
        ffmpeg.FS('writeFile', 'aud.mp3', await fetchFile(audioBlob));

        const subtitulo = document.getElementById('scriptInput').value || "CapacitiumX V3";

        // Comando FFmpeg: Imagen + Audio + Texto quemado en el video
        status.innerText = "CODIFICANDO MP4 (1080p)... POR FAVOR ESPERA";
        
        await ffmpeg.run(
            '-loop', '1', '-i', 'img.jpg', 
            '-i', 'aud.mp3',
            '-vf', `scale=1280:720,drawtext=text='${subtitulo}':fontcolor=yellow:fontsize=45:x=(w-text_w)/2:y=h-100:box=1:boxcolor=black@0.5:boxborderw=5`,
            '-c:v', 'libx264', '-tune', 'stillimage', '-c:a', 'aac', '-b:a', '192k', '-pix_fmt', 'yuv420p', '-shortest', 'output.mp4'
        );

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const a = document.createElement('a');
        a.href = url;
        a.download = "video_capacitiumx_final.mp4";
        a.click();
        status.innerText = "¡VIDEO MP4 DESCARGADO!";
    }
</script>

</body>
</html>
