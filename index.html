<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - WEB ÉLITE TOTAL</title>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* BARRA SUPERIOR (ESTILO TU PYTHON) */
        header { background: #111; padding: 12px; border-bottom: 2px solid var(--neon); display: flex; gap: 10px; align-items: center; }
        .btn-top { padding: 8px 15px; background: #222; border: 1px solid #444; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 8px; width: 200px; }

        /* ÁREA DE TRABAJO */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        #gallery { width: 300px; background: #080808; border-right: 1px solid #222; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #151515; border: 1px solid #333; cursor: pointer; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .selected { border: 2px solid var(--neon) !important; }

        /* MONITOR (EL LIENZO DE VIDEO) */
        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #video-canvas { width: 90%; max-width: 850px; aspect-ratio: 16/9; border: 1px solid #333; background: #000; }

        /* TIMELINE Y CONTROLES */
        .timeline { height: 160px; background: #0a0a0a; border-top: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .btn-action { padding: 14px 28px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; font-size: 14px; }
        .btn-rec { background: var(--red); color: white; }
        .btn-export { background: var(--neon); color: black; }
        .recording { animation: blink 1s infinite; box-shadow: 0 0 20px var(--red); }
        @keyframes blink { 50% { opacity: 0.5; } }
        #status { font-size: 12px; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--neon); font-weight:bold; font-size:11px;">🔍 TEMA:</div>
    <input type="text" id="topic" value="monterrey rayados">
    <button class="btn-top" onclick="searchImages()">TRAER 30 FOTOS ✨</button>
    <button class="btn-top" onclick="addText()">PONER TEXTO</button>
    <button class="btn-top" style="background:#400;" onclick="location.reload()">🗑️ LIMPIAR</button>
</header>

<div class="workspace">
    <div id="gallery"></div>
    <div class="monitor-area">
        <canvas id="video-canvas" width="1280" height="720"></canvas>
        <div id="status">MODO: CAPTURA DE LIENZO (ESTILO PYTHON)</div>
    </div>
</div>

<div class="timeline">
    <div style="display: flex; gap: 20px;">
        <button id="recBtn" class="btn-action btn-rec" onclick="startProduction()">🎙️ NARRAR Y CREAR VIDEO</button>
        <button id="dlBtn" class="btn-action btn-export" onclick="downloadVideo()" disabled>📥 DESCARGAR MP4</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('video-canvas');
    const ctx = canvas.getContext('2d');
    let recorder;
    let chunks = [];
    let isRecording = false;
    let videoBlob;
    let currentImg = new Image();
    let overlayText = "";

    // 1. BUSCADOR DE FOTOS (Picsum para evitar bloqueos)
    async function searchImages() {
        const q = document.getElementById('topic').value;
        const gal = document.getElementById('gallery');
        gal.innerHTML = "";
        for(let i=0; i<30; i++) {
            const box = document.createElement('div');
            box.className = "thumb-box";
            const img = document.createElement('img');
            img.src = `https://picsum.photos/seed/${q+i}/800/450`;
            box.onclick = () => {
                currentImg.crossOrigin = "anonymous";
                currentImg.src = img.src;
                currentImg.onload = () => drawMonitor();
            };
            box.appendChild(img);
            gal.appendChild(box);
        }
    }

    // 2. TEXTO
    function addText() {
        overlayText = prompt("Escribe el texto para el video:");
        drawMonitor();
    }

    // DIBUJAR EN EL MONITOR
    function drawMonitor() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (currentImg.src) {
            ctx.drawImage(currentImg, 0, 0, canvas.width, canvas.height);
        }
        if (overlayText) {
            ctx.fillStyle = "yellow";
            ctx.font = "bold 60px Impact";
            ctx.textAlign = "center";
            ctx.strokeStyle = "black";
            ctx.lineWidth = 8;
            ctx.strokeText(overlayText.toUpperCase(), canvas.width/2, canvas.height * 0.85);
            ctx.fillText(overlayText.toUpperCase(), canvas.width/2, canvas.height * 0.85);
        }
    }

    // 3. MOTOR DE GRABACIÓN (LO QUE VES ES LO QUE SE GRABA)
    async function startProduction() {
        const btn = document.getElementById('recBtn');
        if (!isRecording) {
            try {
                const audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const videoStream = canvas.captureStream(30); 
                
                const combined = new MediaStream([
                    ...videoStream.getVideoTracks(),
                    ...audioStream.getAudioTracks()
                ]);

                recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
                chunks = [];

                recorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
                recorder.onstop = () => {
                    videoBlob = new Blob(chunks, { type: 'video/webm' });
                    document.getElementById('dlBtn').disabled = false;
                };

                recorder.start();
                isRecording = true;
                btn.innerText = "⏹ DETENER Y GUARDAR";
                btn.classList.add('recording');
            } catch (err) {
                alert("Error: Activa el micrófono.");
            }
        } else {
            recorder.stop();
            isRecording = false;
            btn.innerText = "🎙️ NARRAR Y CREAR VIDEO";
            btn.classList.remove('recording');
        }
    }

    function downloadVideo() {
        const url = URL.createObjectURL(videoBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `CAPACITIUMX_${Date.now()}.webm`;
        a.click();
    }

    // Dibujo inicial
    drawMonitor();
</script>

</body>
</html>
