<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX - VIRTUAL BG FINAL FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-load { background: var(--neon); color: black; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; }
        #media-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .thumb-nav { padding: 8px; background: #222; border: 1px solid #444; font-size: 11px; cursor: pointer; }
        .thumb-nav.active { border-color: var(--neon); background: #111; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #canvas-render { width: 95%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid #333; background: #000; }
        
        .console { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 100; }
        .btn-c { background: rgba(0,0,0,0.85); border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-size: 10px; font-weight: bold; border-radius: 4px; }
        select.bg-selector { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 8px; font-size: 11px; border-radius: 4px; cursor: pointer; }

        .footer { height: 140px; background: #111; border-top: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .btn-rec { background: var(--red); color: white; padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX V329 - CHROMA STUDIO</div>
    <div id="ai-status" style="color:yellow; font-size:11px;">ESPERANDO IA...</div>
</header>

<div class="main">
    <aside class="sidebar">
        <button class="btn-load" onclick="document.getElementById('file-in').click()">📥 SUBIR VIDEO/FOTOS</button>
        <input type="file" id="file-in" multiple accept="image/*,video/*" style="display:none;" onchange="handleFiles(event)">
        <div id="media-list"></div>
    </aside>

    <main class="monitor-area">
        <div class="console">
            <label style="font-size:10px; color:white; font-weight:bold;">FONDO VIRTUAL:</label>
            <select class="bg-selector" id="bgChoice" onchange="virtualBGType = this.value">
                <option value="none">Original</option>
                <option value="#00ff00">Chroma Verde</option>
                <option value="#0000ff">Azul Estudio</option>
                <option value="#000000">Negro Total</option>
                <option value="#ffffff">Blanco Limpio</option>
                <option value="blur">Desenfoque (Blur)</option>
            </select>
            <hr style="border:0.5px solid #333">
            <button class="btn-c" onclick="camMode='full'">👤 YO GRANDE</button>
            <button class="btn-c" onclick="camMode='mini'">🖼️ YO CHICO</button>
            <button class="btn-c" onclick="camMode='off'">🚫 OCULTARME</button>
        </div>
        <canvas id="canvas-render" width="1280" height="720"></canvas>
    </main>
</div>

<div class="footer">
    <button id="recBtn" class="btn-rec" onclick="toggleCapture()">🎙️ EMPEZAR GRABACIÓN</button>
    <button id="dlBtn" style="display:none; background:var(--neon); padding:10px 20px; font-weight:bold; cursor:pointer;" onclick="download()">📥 GUARDAR VIDEO</button>
</div>

<video id="v-cam" autoplay playsinline style="display:none"></video>
<video id="v-bg" loop style="display:none" crossorigin="anonymous"></video>
<canvas id="cam-process" width="640" height="480" style="display:none"></canvas>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const vCam = document.getElementById('v-cam');
    const vBg = document.getElementById('v-bg');
    const camProcess = document.getElementById('cam-process');
    const ctxCam = camProcess.getContext('2d');

    let library = [], curIdx = -1, camMode = 'mini', camX = 930, camY = 50, camW = 320, camH = 240;
    let net = null, virtualBGType = 'none', isRecording = false;

    // 1. CARGAR IA (BodyPix)
    async function loadAI() {
        net = await bodyPix.load({
            architecture: 'MobileNetV1',
            outputStride: 16,
            multiplier: 0.75,
            quantBytes: 2
        });
        document.getElementById('ai-status').innerText = "IA LISTA - FONDOS ACTIVADOS";
        render(); // Iniciar bucle
    }
    loadAI();

    function handleFiles(e) {
        Array.from(e.target.files).forEach(file => {
            const url = URL.createObjectURL(file);
            const isVid = file.type.includes('video');
            const item = { type: isVid ? 'vid' : 'img', url: url, el: null };
            if (!isVid) { const img = new Image(); img.src = url; item.el = img; }
            library.push(item);
            updateList();
            if(curIdx === -1) selectMedia(0);
        });
    }

    function updateList() {
        const list = document.getElementById('media-list');
        list.innerHTML = "";
        library.forEach((m, i) => {
            const d = document.createElement('div');
            d.className = `thumb-nav ${i === curIdx ? 'active' : ''}`;
            d.innerText = `${i+1}. ${m.type === 'vid' ? '🎥 VIDEO' : '🖼️ FOTO'}`;
            d.onclick = () => selectMedia(i);
            list.appendChild(d);
        });
    }

    function selectMedia(i) {
        curIdx = i; const m = library[i];
        if (m.type === 'vid') { vBg.src = m.url; vBg.muted = false; vBg.play(); }
    }

    // 2. CÁMARA
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => vCam.srcObject = s);

    // 3. MOTOR DE DIBUJO CON IA (FIXED)
    async function render() {
        // Limpiar Monitor
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Dibujar Fondo (Video/Foto)
        if (curIdx !== -1) {
            const m = library[curIdx];
            if (m.type === 'img' && m.el) ctx.drawImage(m.el, 0, 0, canvas.width, canvas.height);
            else if (m.type === 'vid') ctx.drawImage(vBg, 0, 0, canvas.width, canvas.height);
        }

        // Procesar Cámara
        if (camMode !== 'off' && vCam.readyState >= 2) {
            if (net && virtualBGType !== 'none') {
                const segmentation = await net.segmentPerson(vCam);
                ctxCam.drawImage(vCam, 0, 0, 640, 480);
                let frame = ctxCam.getImageData(0, 0, 640, 480);
                
                for (let i = 0; i < segmentation.data.length; i++) {
                    if (segmentation.data[i] === 0) { // Es fondo
                        if (virtualBGType === 'blur') {
                            frame.data[i * 4 + 3] = 100; // Transparencia para blur
                        } else {
                            // Aplicar color sólido
                            const rgb = hexToRgb(virtualBGType);
                            frame.data[i * 4] = rgb.r;
                            frame.data[i * 4 + 1] = rgb.g;
                            frame.data[i * 4 + 2] = rgb.b;
                            frame.data[i * 4 + 3] = 255;
                        }
                    }
                }
                ctxCam.putImageData(frame, 0, 0);
            } else {
                ctxCam.drawImage(vCam, 0, 0, 640, 480);
            }

            // Inyectar en Monitor
            if (camMode === 'full') {
                ctx.drawImage(camProcess, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
                ctx.strokeRect(camX, camY, camW, camH);
                ctx.drawImage(camProcess, camX, camY, camW, camH);
            }
        }
        requestAnimationFrame(render);
    }

    function hexToRgb(hex) {
        if(hex === 'blur') return {r:0,g:0,b:0};
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : {r:0,g:0,b:0};
    }

    // Grabación (Igual que antes pero ahora captura el canvas con IA)
    let recorder, chunks = [];
    async function toggleCapture() {
        const btn = document.getElementById('recBtn');
        if (!isRecording) {
            const audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            const videoStream = canvas.captureStream(30);
            const combined = new MediaStream([...videoStream.getVideoTracks(), ...audioStream.getAudioTracks()]);
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').style.display = "block";
                document.getElementById('dlBtn').onclick = () => {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = "REACCION_IA_FINAL.webm"; a.click();
                };
            };
            recorder.start(); isRecording = true;
            btn.innerText = "⏹ DETENER";
        } else { recorder.stop(); isRecording = false; btn.innerText = "🎙️ EMPEZAR GRABACIÓN"; }
    }
</script>
</body>
</html>
