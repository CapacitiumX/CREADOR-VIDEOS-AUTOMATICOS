<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX CLOUD EDITOR V1</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; }
        .app-container { display: grid; grid-template-columns: 300px 1fr 300px; height: 100vh; }
        
        /* Paneles */
        .panel { border: 1px solid #222; padding: 15px; display: flex; flex-direction: column; }
        header { grid-column: 1 / span 3; background: #111; padding: 10px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; }
        
        /* Buscador */
        #search-results { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; overflow-y: auto; }
        .thumb { width: 100%; cursor: pointer; border: 1px solid #333; }
        .thumb:hover { border-color: var(--neon); }

        /* Monitor Preview */
        .preview-area { display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        #monitor { width: 80%; aspect-ratio: 16/9; border: 2px solid #333; background-size: cover; background-position: center; }
        
        /* Timeline y Botones */
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px; cursor: pointer; font-weight: bold; }
        button:hover { background: var(--neon); color: black; }
        .rec-active { background: red; color: white; border-color: white; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div>[ CAPACITIUMX WEB ENGINE ]</div>
        <div id="status">Estado: Listo</div>
    </header>

    <aside class="panel">
        <input type="text" id="query" placeholder="Buscar imágenes..." style="width:90%; padding:5px;">
        <button onclick="fetchImages()" style="margin-top:5px;">BUSCAR WEB</button>
        <div id="search-results" style="margin-top:15px;"></div>
    </aside>

    <main class="preview-area">
        <div id="monitor"></div>
        <div class="controls">
            <button id="btnRec" onclick="toggleMic()">🎙️ GRABAR VOZ</button>
            <button onclick="renderVideo()" style="background: var(--neon); color: black;">🎬 EXPORTAR MP4</button>
        </div>
        <p id="timer">00:00</p>
    </main>

    <aside class="panel">
        <label>Guion / Historia:</label>
        <textarea id="script" style="flex:1; background:#111; color:#ccc; margin-top:10px;" placeholder="Escribe aquí..."></textarea>
    </aside>
</div>

<script>
    let selectedImage = "";
    let audioBlob;
    let recorder;
    let chunks = [];

    // 1. Buscador de Imágenes Real (Usando Unsplash Source)
    function fetchImages() {
        const q = document.getElementById('query').value;
        const res = document.getElementById('search-results');
        res.innerHTML = "Cargando...";
        
        // Generamos 10 variaciones de imágenes reales basadas en la palabra
        res.innerHTML = "";
        for(let i=0; i<10; i++) {
            const url = `https://picsum.photos/seed/${q+i}/800/450`;
            const img = document.createElement('img');
            img.src = url;
            img.className = "thumb";
            img.onclick = () => {
                selectedImage = url;
                document.getElementById('monitor').style.backgroundImage = `url(${url})`;
            };
            res.appendChild(img);
        }
    }

    // 2. Grabación de Voz
    async function toggleMic() {
        const btn = document.getElementById('btnRec');
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                audioBlob = new Blob(chunks, { type: 'audio/mp3' });
                document.getElementById('status').innerText = "Voz Grabada Correctamente";
            };
            recorder.start();
            btn.classList.add('rec-active');
            btn.innerText = "⏹ DETENER";
        } else {
            recorder.stop();
            btn.classList.remove('rec-active');
            btn.innerText = "🎙️ GRABAR VOZ";
        }
    }

    // 3. RENDERIZADO MP4 (ELITE)
    async function renderVideo() {
        if(!selectedImage || !audioBlob) {
            alert("Necesitas seleccionar una imagen y grabar voz primero.");
            return;
        }

        const status = document.getElementById('status');
        status.innerText = "Procesando Video MP4... Espera";
        
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({ log: true });
        
        await ffmpeg.load();
        
        // Escribimos los archivos en la memoria virtual
        ffmpeg.FS('writeFile', 'image.jpg', await fetchFile(selectedImage));
        ffmpeg.FS('writeFile', 'audio.mp3', await fetchFile(audioBlob));

        // Comando Maestro: Une imagen y audio en un MP4 de 10 segundos
        // -loop 1 repite la imagen, -shortest corta cuando acabe el audio
        await ffmpeg.run('-loop', '1', '-i', 'image.jpg', '-i', 'audio.mp3', '-c:v', 'libx264', '-t', '10', '-pix_fmt', 'yuv420p', '-vf', 'scale=1280:720', '-c:a', 'aac', '-shortest', 'output.mp4');

        const data = ffmpeg.FS('readFile', 'output.mp4');
        const videoUrl = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const link = document.createElement('a');
        link.href = videoUrl;
        link.download = "video_capacitiumx.mp4";
        link.click();
        
        status.innerText = "¡Video Exportado!";
    }
</script>

</body>
</html>
