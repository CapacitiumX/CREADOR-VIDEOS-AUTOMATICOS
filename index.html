<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX ULTIMATE - FIX FINAL</title>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main-engine { display: flex; flex: 1; overflow: hidden; }
        
        /* Panel Lateral */
        .sidebar { width: 280px; background: #0a0a0a; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .btn-upload { background: var(--neon); color: black; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #media-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .thumb-item { background: #222; padding: 5px; border-radius: 4px; font-size: 10px; cursor: pointer; border: 1px solid transparent; }
        .thumb-item:hover { border-color: var(--neon); }

        /* Monitor */
        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #canvas-render { width: 95%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid #333; background: #000; cursor: move; }
        
        /* Timeline */
        .timeline { height: 150px; background: #0a0a0a; border-top: 2px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .btn-action { padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 6px; border: none; text-transform: uppercase; }
        .btn-rec { background: var(--red); color: white; }
        .btn-export { background: var(--neon); color: black; }
        .recording { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX STUDIO V329</div>
    <div style="display:flex; gap:10px;">
        <button class="btn-upload" style="padding:5px 10px;" onclick="toggleCam()">📷 CÁMARA</button>
        <button class="btn-upload" style="padding:5px 10px;" onclick="setCamFull()">👤 PANTALLA COMPLETA</button>
        <button class="btn-upload" style="padding:5px 10px;" onclick="addText()">📝 TEXTO</button>
    </div>
</header>

<div class="main-engine">
    <aside class="sidebar">
        <div class="btn-upload" onclick="document.getElementById('file-in').click()">📥 SUBIR ARCHIVOS</div>
        <input type="file" id="file-in" multiple accept="image/*,video/*" style="display:none;" onchange="handleFiles(event)">
        <div id="media-list"></div>
    </aside>

    <main class="monitor-area">
        <canvas id="canvas-render" width="1280" height="720"></canvas>
        <div id="status" style="font-size:12px; color:#666; margin-top:10px;">ARRASTRA LA CÁMARA PARA REUBICARLA</div>
    </main>
</div>

<div class="timeline">
    <div style="display: flex; gap: 20px;">
        <button id="recBtn" class="btn-action btn-rec" onclick="toggleCapture()">🎙️ EMPEZAR GRABACIÓN</button>
        <button id="dlBtn" class="btn-action btn-export" onclick="downloadVideo()" disabled>📥 DESCARGAR VIDEO</button>
    </div>
</div>

<video id="v-cam" autoplay playsinline style="display:none"></video>
<video id="v-player" loop muted style="display:none"></video>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const vCam = document.getElementById('v-cam');
    const vPlayer = document.getElementById('v-player');

    let mediaLibrary = [];
    let activeMedia = null;
    let isCamOn = false;
    let camFull = false;
    let camX = 900, camY = 50, camW = 320, camH = 240;
    let dragging = false;
    let overlayText = "";
    
    let recorder, chunks = [], isRecording = false, finalBlob;

    // 1. CARGAR FOTOS/VIDEOS
    function handleFiles(e) {
        Array.from(e.target.files).forEach(file => {
            const url = URL.createObjectURL(file);
            const isVideo = file.type.includes('video');
            const item = { name: file.name, type: isVideo ? 'video' : 'img', url: url };
            
            if (!isVideo) {
                const img = new Image(); img.src = url;
                item.el = img;
            }
            
            mediaLibrary.push(item);
            activeMedia = item; // Activar el último subido
            
            const div = document.createElement('div');
            div.className = "thumb-item";
            div.innerText = (isVideo ? "🎥 " : "🖼️ ") + file.name;
            div.onclick = () => { activeMedia = item; if(isVideo) { vPlayer.src = url; vPlayer.play(); } };
            document.getElementById('media-list').appendChild(div);
        });
    }

    // 2. CONTROL DE CÁMARA
    async function toggleCam() {
        if (!isCamOn) {
            const s = await navigator.mediaDevices.getUserMedia({ video: true });
            vCam.srcObject = s; isCamOn = true;
        } else { isCamOn = false; }
    }
    function setCamFull() { camFull = !camFull; }
    function addText() { overlayText = prompt("Escribe el texto:") || ""; }

    // 3. ARRASTRAR CÁMARA (LÓGICA CORREGIDA)
    canvas.onmousedown = (e) => {
        const r = canvas.getBoundingClientRect();
        const x = (e.clientX - r.left) * (canvas.width / r.width);
        const y = (e.clientY - r.top) * (canvas.height / r.height);
        if (x > camX && x < camX + camW && y > camY && y < camY + camH) dragging = true;
    };
    window.onmousemove = (e) => {
        if (dragging) {
            const r = canvas.getBoundingClientRect();
            camX = (e.clientX - r.left) * (canvas.width / r.width) - camW/2;
            camY = (e.clientY - r.top) * (canvas.height / r.height) - camH/2;
        }
    };
    window.onmouseup = () => dragging = false;

    // 4. BUCLE DE DIBUJO (EL CORAZÓN DEL PROGRAMA)
    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Dibujar Fondo
        if (activeMedia) {
            if (activeMedia.type === 'img' && activeMedia.el) {
                ctx.drawImage(activeMedia.el, 0, 0, canvas.width, canvas.height);
            } else if (activeMedia.type === 'video') {
                if (vPlayer.src !== activeMedia.url) vPlayer.src = activeMedia.url;
                ctx.drawImage(vPlayer, 0, 0, canvas.width, canvas.height);
            }
        }

        // Dibujar Cámara
        if (isCamOn) {
            if (camFull) {
                ctx.drawImage(vCam, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
                ctx.strokeRect(camX, camY, camW, camH);
                ctx.drawImage(vCam, camX, camY, camW, camH);
            }
        }

        // Dibujar Texto
        if (overlayText) {
            ctx.fillStyle = "yellow"; ctx.font = "bold 60px Impact"; ctx.textAlign = "center";
            ctx.strokeStyle = "black"; ctx.lineWidth = 8;
            ctx.strokeText(overlayText.toUpperCase(), canvas.width/2, 650);
            ctx.fillText(overlayText.toUpperCase(), canvas.width/2, 650);
        }

        requestAnimationFrame(draw);
    }

    // 5. GRABACIÓN SEGURA
    async function toggleCapture() {
        const btn = document.getElementById('recBtn');
        if (!isRecording) {
            const audio = await navigator.mediaDevices.getUserMedia({ audio: true });
            const videoStream = canvas.captureStream(30);
            const combined = new MediaStream([...videoStream.getVideoTracks(), ...audio.getAudioTracks()]);
            
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                finalBlob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').disabled = false;
            };
            
            recorder.start(); isRecording = true;
            btn.innerText = "⏹ DETENER GRABACIÓN"; btn.classList.add('recording');
        } else {
            recorder.stop(); isRecording = false;
            btn.innerText = "🎙️ EMPEZAR GRABACIÓN"; btn.classList.remove('recording');
        }
    }

    function downloadVideo() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(finalBlob);
        a.download = `CAPACITIUMX_REACTION.webm`;
        a.click();
    }

    draw(); // Iniciar motor visual
</script>
</body>
</html>
