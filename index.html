<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX - AUDIO MIXER PRO</title>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #111; padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #000; border-right: 1px solid #333; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-load { background: var(--neon); color: black; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; border-radius: 4px; border: none; }
        #media-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
        .thumb-nav { padding: 8px; background: #222; border: 1px solid #444; font-size: 11px; cursor: pointer; border-radius: 4px; }
        .thumb-nav.active { border-color: var(--neon); background: #111; }

        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; position: relative; }
        #canvas-render { width: 95%; max-width: 900px; aspect-ratio: 16/9; border: 1px solid #333; background: #050505; }
        
        .console { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; }
        .btn-c { background: rgba(0,0,0,0.8); border: 1px solid var(--neon); color: var(--neon); padding: 8px; cursor: pointer; font-size: 10px; font-weight: bold; }

        .footer { height: 150px; background: #111; border-top: 2px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
        .btn-rec { background: var(--red); color: white; padding: 15px 30px; font-weight: bold; cursor: pointer; border: none; border-radius: 8px; }
        .recording { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX V329 - AUDIO MIX</div>
    <div style="color:#666; font-size: 12px;">MEZCLA DE AUDIO: ACTIVADA</div>
</header>

<div class="main">
    <aside class="sidebar">
        <button class="btn-load" onclick="document.getElementById('file-in').click()">📥 SUBIR VIDEO/FOTOS</button>
        <input type="file" id="file-in" multiple accept="image/*,video/*" style="display:none;" onchange="handleFiles(event)">
        <div id="media-list"></div>
    </aside>

    <main class="monitor-area">
        <div class="console">
            <button class="btn-c" onclick="camMode='full'">👤 YO GRANDE</button>
            <button class="btn-c" onclick="camMode='mini'">🖼️ YO CHICO</button>
            <button class="btn-c" id="playBtn" onclick="togglePlay()">▶ PLAY / PAUSA FONDO</button>
        </div>
        <canvas id="canvas-render" width="1280" height="720"></canvas>
    </main>
</div>

<div class="footer">
    <button id="recBtn" class="btn-rec" onclick="toggleCapture()">🎙️ GRABAR REACCIÓN CON AUDIO ORIGINAL</button>
    <button id="dlBtn" style="display:none; background:var(--neon); padding:10px 20px; font-weight:bold; cursor:pointer;" onclick="download()">📥 GUARDAR VIDEO FINAL</button>
</div>

<video id="v-cam" autoplay playsinline style="display:none"></video>
<video id="v-bg" loop style="display:none" crossOrigin="anonymous"></video>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const vCam = document.getElementById('v-cam');
    const vBg = document.getElementById('v-bg');

    let library = [];
    let curIdx = -1;
    let camMode = 'mini'; 
    let camX = 930, camY = 50, camW = 300, camH = 225;
    let dragging = false;
    let recorder, chunks = [], isRecording = false;

    // CARGA DE MEDIOS
    function handleFiles(e) {
        Array.from(e.target.files).forEach(file => {
            const url = URL.createObjectURL(file);
            const isVid = file.type.includes('video');
            const item = { type: isVid ? 'vid' : 'img', url: url, el: null };
            if (!isVid) { const img = new Image(); img.src = url; item.el = img; }
            library.push(item);
            updateList();
            if(curIdx === -1) selectMedia(0);
        });
    }

    function updateList() {
        const list = document.getElementById('media-list');
        list.innerHTML = "";
        library.forEach((m, i) => {
            const d = document.createElement('div');
            d.className = `thumb-nav ${i === curIdx ? 'active' : ''}`;
            d.innerText = `${i+1}. ${m.type === 'vid' ? '🎥 VIDEO' : '🖼️ FOTO'}`;
            d.onclick = () => selectMedia(i);
            list.appendChild(d);
        });
    }

    function selectMedia(i) {
        curIdx = i;
        const m = library[i];
        if (m.type === 'vid') {
            vBg.src = m.url;
            vBg.muted = false; // IMPORTANTE: No debe estar silenciado
            vBg.volume = 0.7;  // Volumen del video de fondo al 70% para que tu voz se oiga
            vBg.load();
            vBg.play(); 
        }
        updateList();
    }

    function togglePlay() {
        if (vBg.paused) vBg.play(); else vBg.pause();
    }

    // CÁMARA
    navigator.mediaDevices.getUserMedia({ video: true }).then(s => vCam.srcObject = s);

    // DIBUJO
    function render() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        if (curIdx !== -1) {
            const m = library[curIdx];
            if (m.type === 'img' && m.el) ctx.drawImage(m.el, 0, 0, canvas.width, canvas.height);
            else if (m.type === 'vid') ctx.drawImage(vBg, 0, 0, canvas.width, canvas.height);
        }
        if (vCam.srcObject) {
            if (camMode === 'full') ctx.drawImage(vCam, 0, 0, canvas.width, canvas.height);
            else {
                ctx.strokeStyle = "#00ff00"; ctx.lineWidth = 4;
                ctx.strokeRect(camX, camY, camW, camH);
                ctx.drawImage(vCam, camX, camY, camW, camH);
            }
        }
        requestAnimationFrame(render);
    }

    // GRABACIÓN CON MEZCLA DE AUDIO (EL CORAZÓN DEL PROBLEMA)
    async function toggleCapture() {
        const btn = document.getElementById('recBtn');
        if (!isRecording) {
            // 1. Capturar tu voz
            const micStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
            
            // 2. Capturar video del monitor
            const canvasStream = canvas.captureStream(30);
            
            // 3. CAPTURAR EL AUDIO DEL VIDEO ORIGINAL
            const audioCtx = new AudioContext();
            const sourceMic = audioCtx.createMediaStreamSource(micStream);
            const sourceVid = audioCtx.createMediaElementSource(vBg);
            const destination = audioCtx.createMediaStreamDestination();
            
            // Mezclamos ambos sonidos en el destino final
            sourceMic.connect(destination);
            sourceVid.connect(destination);
            sourceVid.connect(audioCtx.destination); // Esto es para que TÚ lo oigas mientras grabas

            // 4. Unir todo
            const combined = new MediaStream([
                ...canvasStream.getVideoTracks(),
                ...destination.stream.getAudioTracks()
            ]);
            
            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').style.display = "block";
                document.getElementById('dlBtn').onclick = () => {
                    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                    a.download = "REACCION_CON_AUDIO_MIX.webm"; a.click();
                };
            };
            recorder.start(); isRecording = true;
            btn.innerText = "⏹ DETENER Y GUARDAR"; btn.classList.add('recording');
        } else {
            recorder.stop(); isRecording = false;
            btn.innerText = "🎙️ EMPEZAR GRABACIÓN"; btn.classList.remove('recording');
        }
    }

    render();
</script>
</body>
</html>
