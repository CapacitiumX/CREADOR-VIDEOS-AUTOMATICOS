<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAPACITIUMX V329 - STUDIO PRO</title>
    <style>
        :root { --neon: #00ff00; --dark: #050505; --red: #ff3333; --panel: #111; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--panel); padding: 10px 20px; border-bottom: 2px solid var(--neon); display: flex; justify-content: space-between; align-items: center; }
        .logo { color: var(--neon); font-weight: bold; letter-spacing: 2px; }

        .main-view { display: flex; flex: 1; overflow: hidden; }
        
        /* Panel Lateral: Biblioteca */
        .sidebar { width: 300px; background: var(--panel); border-right: 1px solid #333; display: flex; flex-direction: column; padding: 15px; }
        .drop-zone { border: 2px dashed var(--neon); padding: 15px; text-align: center; color: var(--neon); cursor: pointer; margin-bottom: 15px; font-size: 12px; }
        .media-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .media-item { display: flex; align-items: center; gap: 10px; background: #222; padding: 5px; border-radius: 4px; border: 1px solid #444; }
        .media-item img { width: 60px; aspect-ratio: 16/9; object-fit: cover; }
        .media-item span { font-size: 10px; flex: 1; overflow: hidden; }

        /* Monitor */
        .monitor-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px; }
        #canvas-render { width: 100%; max-width: 850px; aspect-ratio: 16/9; border: 1px solid #222; background: #000; box-shadow: 0 0 30px rgba(0,255,0,0.1); }
        video#webcam { display: none; }

        /* Timeline Mejorada */
        .timeline-container { height: 200px; background: #0a0a0a; border-top: 2px solid #333; display: flex; flex-direction: column; }
        .timeline-controls { padding: 10px; display: flex; justify-content: center; gap: 15px; border-bottom: 1px solid #222; }
        .track-view { flex: 1; position: relative; overflow-x: auto; white-space: nowrap; padding: 20px 50px; display: flex; align-items: center; gap: 2px; }
        
        /* Clips en Timeline */
        .clip { 
            display: inline-block; width: 120px; height: 60px; 
            border: 2px solid var(--neon); background-size: cover; 
            background-position: center; position: relative; 
            cursor: grab; flex-shrink: 0;
        }
        .clip:active { cursor: grabbing; opacity: 0.5; }
        .clip-num { position: absolute; top: 0; left: 0; background: var(--neon); color: black; font-size: 10px; font-weight: bold; padding: 2px 5px; }

        .btn { padding: 10px 20px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; text-transform: uppercase; }
        .btn-rec { background: var(--red); color: white; }
        .btn-export { background: var(--neon); color: black; }
        .btn-text { background: #2563eb; color: white; }
        .recording { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <div class="logo">CAPACITIUMX STUDIO V329</div>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-text" onclick="toggleWebcam()">📷 CAM ON/OFF</button>
        <button class="btn btn-text" onclick="editSubtitle()">➕ EDITAR TEXTO</button>
        <button class="btn" style="background:#444; color:white;" onclick="location.reload()">🗑️ LIMPIAR</button>
    </div>
</header>

<div class="main-view">
    <aside class="sidebar">
        <div class="drop-zone" onclick="document.getElementById('files').click()">
            📥 SUBIR FOTOS (SE VAN SUMANDO)
            <input type="file" id="files" multiple accept="image/*" style="display:none;" onchange="addMedia(event)">
        </div>
        <div id="media-list" class="media-list"></div>
    </aside>

    <main class="monitor-area">
        <canvas id="canvas-render" width="1280" height="720"></canvas>
        <video id="webcam" autoplay playsinline></video>
        <div id="status" style="margin-top:10px; color:yellow; font-size:12px;">MODO: ESPERANDO FOTOS...</div>
    </main>
</div>

<div class="timeline-container">
    <div class="timeline-controls">
        <button id="recBtn" class="btn btn-rec" onclick="startProduction()">🎙️ GRABAR NARRACIÓN + VIDEO</button>
        <button id="dlBtn" class="btn btn-export" onclick="downloadFinal()" disabled>📥 DESCARGAR VIDEO FINAL</button>
    </div>
    <div class="track-view" id="timeline-track" ondragover="allowDrop(event)" ondrop="drop(event)">
        </div>
</div>

<script>
    const canvas = document.getElementById('canvas-render');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('webcam');
    
    let mediaFiles = []; // Lista maestra de fotos
    let subtitle = "CAPACITIUMX";
    let isWebcamActive = false;
    let webcamStream = null;

    let recorder;
    let chunks = [];
    let isRecording = false;
    let finalBlob;
    let startTime;

    // --- 1. GESTIÓN DE FOTOS (SUMAR Y ALINEAR) ---
    function addMedia(event) {
        const files = Array.from(event.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const id = Date.now() + Math.random();
                    mediaFiles.push({ id, img, name: file.name });
                    renderTimeline();
                };
            };
            reader.readAsDataURL(file);
        });
    }

    function renderTimeline() {
        const track = document.getElementById('timeline-track');
        const list = document.getElementById('media-list');
        track.innerHTML = "";
        list.innerHTML = "";

        mediaFiles.forEach((file, index) => {
            // Clip en Timeline
            const clip = document.createElement('div');
            clip.className = "clip";
            clip.draggable = true;
            clip.style.backgroundImage = `url(${file.img.src})`;
            clip.innerHTML = `<div class="clip-num">${index + 1}</div>`;
            
            // Eventos para mover orden
            clip.ondragstart = (e) => e.dataTransfer.setData("text", index);
            track.appendChild(clip);

            // Item en Lista lateral
            const item = document.createElement('div');
            item.className = "media-item";
            item.innerHTML = `<img src="${file.img.src}"><span>${file.name}</span>`;
            list.appendChild(item);
        });
        drawPreview();
    }

    // --- 2. MOVIMIENTO EN LÍNEA DE TIEMPO ---
    function allowDrop(e) { e.preventDefault(); }
    function drop(e) {
        e.preventDefault();
        const oldIndex = e.dataTransfer.getData("text");
        const newIndex = Math.floor((e.clientX - 350) / 122); // Estimación simple de posición
        const movedItem = mediaFiles.splice(oldIndex, 1)[0];
        mediaFiles.splice(newIndex, 0, movedItem);
        renderTimeline();
    }

    // --- 3. DIBUJO Y CÁMARA ---
    async function toggleWebcam() {
        if (!isWebcamActive) {
            try {
                webcamStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = webcamStream;
                isWebcamActive = true;
            } catch (e) { alert("Cámara bloqueada"); }
        } else {
            webcamStream.getTracks().forEach(t => t.stop());
            isWebcamActive = false;
        }
    }

    function editSubtitle() {
        const t = prompt("Nuevo texto:", subtitle);
        if (t) subtitle = t;
        drawPreview();
    }

    function drawPreview() {
        if (isRecording) return; // Si graba, el loop se encarga
        drawFrame(0);
    }

    function drawFrame(currentTime) {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Mostrar fotos secuencialmente (4 segundos por foto)
        if (mediaFiles.length > 0) {
            const clipDuration = 4000; 
            const index = Math.floor(currentTime / clipDuration) % mediaFiles.length;
            const img = mediaFiles[index].img;
            
            const scale = Math.min(canvas.width / img.width, canvas.height / img.height);
            const x = (canvas.width / 2) - (img.width / 2) * scale;
            const y = (canvas.height / 2) - (img.height / 2) * scale;
            ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
        }

        // Webcam (PiP)
        if (isWebcamActive) {
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 5;
            ctx.strokeRect(930, 50, 300, 225);
            ctx.drawImage(video, 930, 50, 300, 225);
        }

        // Texto
        ctx.fillStyle = "yellow";
        ctx.font = "bold 60px Impact";
        ctx.textAlign = "center";
        ctx.strokeStyle = "black";
        ctx.lineWidth = 10;
        ctx.strokeText(subtitle.toUpperCase(), canvas.width/2, 650);
        ctx.fillText(subtitle.toUpperCase(), canvas.width/2, 650);
    }

    // --- 4. PRODUCCIÓN FINAL ---
    async function startProduction() {
        if (mediaFiles.length === 0) return alert("Sube fotos primero.");
        const btn = document.getElementById('recBtn');
        
        if (!isRecording) {
            const audioStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });
            const videoStream = canvas.captureStream(30);
            const combined = new MediaStream([...videoStream.getVideoTracks(), ...audioStream.getAudioTracks()]);

            recorder = new MediaRecorder(combined, { mimeType: 'video/webm;codecs=vp9' });
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                finalBlob = new Blob(chunks, { type: 'video/webm' });
                document.getElementById('dlBtn').disabled = false;
            };

            startTime = Date.now();
            recorder.start();
            isRecording = true;
            btn.innerText = "⏹ DETENER Y GUARDAR";
            btn.classList.add('recording');
            
            function loop() {
                if (!isRecording) return;
                drawFrame(Date.now() - startTime);
                requestAnimationFrame(loop);
            }
            loop();
        } else {
            recorder.stop();
            isRecording = false;
            btn.innerText = "🎙️ NARRAR Y GRABAR TODO";
            btn.classList.remove('recording');
        }
    }

    function downloadFinal() {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(finalBlob);
        a.download = `CAPACITIUMX_PROD.webm`;
        a.click();
    }
</script>

</body>
</html>
