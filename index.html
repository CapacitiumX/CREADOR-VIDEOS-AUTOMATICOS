<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CapacitiumX - Cloud Editor Élite</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --dark: #000000; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; }
        
        /* Barra Superior (Estilo tu captura) */
        header { 
            background: #111; padding: 10px; border-bottom: 1px solid #333; 
            display: flex; gap: 10px; align-items: center; justify-content: flex-start;
        }
        .top-btn { padding: 5px 15px; background: #222; border: 1px solid #444; color: white; cursor: pointer; border-radius: 4px; }
        .top-btn:hover { border-color: var(--neon); }
        select { background: #222; color: white; border: 1px solid #444; padding: 5px; }

        /* Área de Trabajo */
        .workspace { display: flex; flex-direction: column; height: calc(100vh - 180px); }
        .monitor-container { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #050505; }
        #main-monitor { 
            width: 70%; aspect-ratio: 16/9; background: #111 center/cover no-repeat; 
            border: 1px solid #222; position: relative; display: flex; align-items: flex-end; justify-content: center;
        }
        #text-overlay { 
            color: yellow; font-size: 3vw; font-weight: bold; text-shadow: 2px 2px 5px black;
            margin-bottom: 5%; text-align: center; width: 90%; pointer-events: none;
        }

        /* Línea de Tiempo (Inferior) */
        .timeline { 
            height: 120px; background: #0a0a0a; border-top: 1px solid #333; 
            display: flex; gap: 10px; padding: 15px; overflow-x: auto; align-items: center;
        }
        .clip { 
            min-width: 160px; height: 90px; border: 2px solid var(--neon); 
            background-size: cover; background-position: center; cursor: pointer;
            transition: 0.2s;
        }
        .clip:hover { transform: scale(1.05); }

        /* Controles de CapCut */
        .editor-tools { padding: 10px; background: #111; border-top: 1px solid #333; display: flex; gap: 20px; justify-content: center; }
        .btn-rec { background: #b91c1c; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-rec.active { animation: blink 1s infinite; }
        .btn-export { background: var(--neon); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }

        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<header>
    <div style="color:var(--neon); font-size: 12px; font-weight: bold;">🔍 TEMA:</div>
    <input type="text" id="search-input" value="monterrey" style="background:#000; color:white; border:1px solid #444; padding:5px;">
    <button class="top-btn" onclick="search30()">BUSCAR WEB ✨</button>
    <select id="voice-sel">
        <option>Paulina (MX 🇲🇽)</option>
        <option>Jorge (ES 🇪🇸)</option>
        <option>Juan (MX 🇲🇽)</option>
    </select>
    <button class="top-btn" onclick="addText()">➕ TEXTO</button>
    <button class="top-btn" style="background:#450a0a;" onclick="clearAll()">🗑️ LIMPIAR</button>
</header>

<div class="workspace">
    <div class="monitor-container">
        <div id="main-monitor">
            <div id="text-overlay"></div>
        </div>
    </div>
</div>

<div class="editor-tools">
    <button id="btn-mic" class="btn-rec" onclick="toggleMic()">🎙️ GRABAR NARRACIÓN</button>
    <button class="btn-export" onclick="exportMP4()">🎬 EXPORTAR VIDEO MP4</button>
    <div id="status-msg" style="font-size: 12px; color: #666; margin-left: 15px;">Listo.</div>
</div>

<div class="timeline" id="timeline-flow">
    </div>

<script>
    let selectedImage = "";
    let recorder;
    let audioChunks = [];
    let audioBlob;
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    // 1. BUSCADOR DE 30 FOTOS (Referente al tema)
    async function search30() {
        const theme = document.getElementById('search-input').value;
        const timeline = document.getElementById('timeline-flow');
        timeline.innerHTML = "<p>Cargando lote de 30 fotos...</p>";
        
        timeline.innerHTML = "";
        for(let i=0; i<30; i++) {
            const url = `https://images.unsplash.com/photo-1?auto=format&fit=crop&w=800&q=80&query=${encodeURIComponent(theme)}&sig=${i}`;
            const clip = document.createElement('div');
            clip.className = "clip";
            clip.style.backgroundImage = `url('${url}')`;
            clip.onclick = () => {
                selectedImage = url;
                document.getElementById('main-monitor').style.backgroundImage = `url('${url}')`;
            };
            timeline.appendChild(clip);
        }
    }

    // 2. TEXTO ESTILO CAPCUT
    function addText() {
        const txt = prompt("Escribe el texto para el video:");
        if(txt) document.getElementById('text-overlay').innerText = txt;
    }

    // 3. GRABACIÓN DE VOZ
    async function toggleMic() {
        const btn = document.getElementById('btn-mic');
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            audioChunks = [];
            recorder.ondataavailable = e => audioChunks.push(e.data);
            recorder.onstop = () => {
                audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                document.getElementById('status-msg').innerText = "Voz capturada con éxito.";
            };
            recorder.start();
            btn.classList.add('active');
            btn.innerText = "⏹ DETENER";
        } else {
            recorder.stop();
            btn.classList.remove('active');
            btn.innerText = "🎙️ GRABAR NARRACIÓN";
        }
    }

    // 4. EXPORTACIÓN REAL MP4 (USA TU NAVEGADOR COMO CAPCUT)
    async function exportMP4() {
        if(!selectedImage || !audioBlob) return alert("Selecciona una foto y graba tu voz.");
        
        const status = document.getElementById('status-msg');
        status.innerText = "PROCESANDO MP4... (Esto puede tardar)";
        
        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        ffmpeg.FS('writeFile', 'input_img.jpg', await fetchFile(selectedImage));
        ffmpeg.FS('writeFile', 'input_audio.mp3', await fetchFile(audioBlob));

        const subtitulo = document.getElementById('text-overlay').innerText || " ";

        // Renderizado con imagen, audio y texto quemado
        await ffmpeg.run(
            '-loop', '1', '-i', 'input_img.jpg', 
            '-i', 'input_audio.mp3',
            '-vf', `scale=1280:720,drawtext=text='${subtitulo}':fontcolor=yellow:fontsize=50:x=(w-text_w)/2:y=h-120:box=1:boxcolor=black@0.4`,
            '-c:v', 'libx264', '-t', '15', '-pix_fmt', 'yuv420p', '-shortest', 'final.mp4'
        );

        const data = ffmpeg.FS('readFile', 'final.mp4');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `CAPACITIUMX_${Date.now()}.mp4`;
        a.click();
        status.innerText = "¡VIDEO EXPORTADO!";
    }

    function clearAll() {
        location.reload();
    }
</script>

</body>
</html>
