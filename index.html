<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CapacitiumX - Editor Pro Similares</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        :root { --neon: #00ff00; --dark: #000; --red: #ff4444; }
        body { background: var(--dark); color: white; font-family: 'Arial', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER - Estilo tu captura */
        header { background: #111; padding: 10px; border-bottom: 1px solid #333; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn-top { padding: 6px 12px; background: #222; border: 1px solid #444; color: white; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-top:hover { border-color: var(--neon); }
        input { background: #000; color: #fff; border: 1px solid #444; padding: 6px; }

        /* CUERPO CENTRAL */
        .main-engine { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* Galería Izquierda (30 fotos) */
        #gallery { width: 280px; background: #080808; border-right: 1px solid #222; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; }
        .thumb { width: 100%; aspect-ratio: 16/9; border: 1px solid #333; cursor: pointer; object-fit: cover; }
        .thumb:hover { border-color: var(--neon); }

        /* Monitor de Previsualización */
        .preview-box { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; padding: 20px; }
        #monitor { 
            width: 100%; max-width: 800px; aspect-ratio: 16/9; border: 2px solid #222; 
            background: #050505 center/contain no-repeat; position: relative;
            display: flex; align-items: flex-end; justify-content: center;
        }
        #text-layer { color: yellow; font-size: 2.5vw; font-weight: bold; text-shadow: 2px 2px 4px #000; margin-bottom: 5%; text-align: center; width: 90%; }

        /* LÍNEA DE TIEMPO INFERIOR */
        .timeline { height: 140px; background: #111; border-top: 2px solid #222; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .controls-row { display: flex; gap: 15px; margin-bottom: 10px; }
        
        /* Botones Acción */
        .btn-rec { background: var(--red); color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-play { background: #444; color: white; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .btn-export { background: var(--neon); color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .recording { animation: blink 1s infinite; box-shadow: 0 0 15px red; }
        @keyframes blink { 50% { opacity: 0.5; } }

        #status { font-size: 11px; color: #888; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--neon); font-size:11px; font-weight:bold;">🟢 TEMA:</div>
    <input type="text" id="keyword" value="monterrey">
    <button class="btn-top" onclick="searchImages()">BUSCAR WEB ✨</button>
    <select id="voice"><option>Paulina (MX 🇲🇽)</option></select>
    <button class="btn-top" onclick="addText()">+ TEXTO</button>
    <button class="btn-top" style="background:#400;" onclick="location.reload()">🗑️ LIMPIAR</button>
</header>

<div class="main-engine">
    <div id="gallery">
        </div>
    
    <div class="preview-box">
        <div id="monitor">
            <div id="text-layer"></div>
        </div>
        <div id="status">Esperando recursos...</div>
    </div>
</div>

<div class="timeline">
    <div class="controls-row">
        <button id="btnRec" class="btn-rec" onclick="startRec()">🎙️ GRABAR NARRACIÓN</button>
        <button id="btnPlay" class="btn-play" onclick="playAudio()" disabled>▶ PLAY VOZ</button>
        <button class="btn-export" onclick="exportVideo()">🎬 EXPORTAR VIDEO MP4</button>
    </div>
    <div id="audio-container"></div>
</div>

<script>
    let selectedImg = "";
    let recorder;
    let chunks = [];
    let audioUrl = "";
    let audioBlob = null;
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    // 1. BUSCADOR DE 30 FOTOS (Corregido para que carguen)
    async function searchImages() {
        const q = document.getElementById('keyword').value;
        const gal = document.getElementById('gallery');
        gal.innerHTML = "Cargando...";
        
        gal.innerHTML = "";
        for(let i=0; i<30; i++) {
            const img = document.createElement('img');
            // Usamos un proveedor más estable
            img.src = `https://picsum.photos/seed/${q+i}/800/450`;
            img.className = "thumb";
            img.onclick = () => {
                selectedImg = img.src;
                document.getElementById('monitor').style.backgroundImage = `url('${img.src}')`;
                document.getElementById('status').innerText = "Imagen lista en monitor.";
            };
            gal.appendChild(img);
        }
    }

    // 2. TEXTO
    function addText() {
        const t = prompt("Texto para el video:");
        if(t) document.getElementById('text-layer').innerText = t;
    }

    // 3. GRABACIÓN DE VOZ (Con Playback)
    async function startRec() {
        const btn = document.getElementById('btnRec');
        if (!recorder || recorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                audioBlob = new Blob(chunks, { type: 'audio/mp3' });
                audioUrl = URL.createObjectURL(audioBlob);
                document.getElementById('btnPlay').disabled = false;
                document.getElementById('status').innerText = "Voz guardada. Dale a PLAY para escuchar.";
            };
            recorder.start();
            btn.classList.add('recording');
            btn.innerText = "⏹ DETENER";
        } else {
            recorder.stop();
            btn.classList.remove('recording');
            btn.innerText = "🎙️ GRABAR NARRACIÓN";
        }
    }

    function playAudio() {
        const a = new Audio(audioUrl);
        a.play();
    }

    // 4. EXPORTAR MP4 (FARMACIA SIMILARES: Efectivo y Real)
    async function exportVideo() {
        if(!selectedImg || !audioBlob) return alert("Falta foto o voz.");
        
        const st = document.getElementById('status');
        st.innerText = "⚡ PROCESANDO MP4... (No cierres la pestaña)";

        if (!ffmpeg.isLoaded()) await ffmpeg.load();

        ffmpeg.FS('writeFile', 'f.jpg', await fetchFile(selectedImg));
        ffmpeg.FS('writeFile', 'a.mp3', await fetchFile(audioBlob));

        const txt = document.getElementById('text-layer').innerText || " ";

        // Comando para unir todo en MP4
        await ffmpeg.run(
            '-loop', '1', '-i', 'f.jpg', '-i', 'a.mp3',
            '-vf', `scale=1280:720,drawtext=text='${txt}':fontcolor=yellow:fontsize=50:x=(w-text_w)/2:y=h-100:box=1:boxcolor=black@0.5`,
            '-c:v', 'libx264', '-t', '10', '-pix_fmt', 'yuv420p', '-shortest', 'out.mp4'
        );

        const data = ffmpeg.FS('readFile', 'out.mp4');
        const url = URL.createObjectURL(new Blob([data.buffer], { type: 'video/mp4' }));
        
        const link = document.createElement('a');
        link.href = url;
        link.download = `CAPACITIUMX_WEB_${Date.now()}.mp4`;
        link.click();
        st.innerText = "✅ VIDEO DESCARGADO.";
    }
</script>

</body>
</html>
